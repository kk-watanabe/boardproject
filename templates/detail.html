{% extends 'base.html' %}

{% block customcss %}
<style>
    body {
        font-size:20px;
    }
</style>
{% endblock customcss %}

{% block header %}
<div class="alert alert-primary" role="alert">
  <h1>個別投稿</h1>
</div>
{% endblock header %}

{% block content %}
<div class="container">
    <div class="alert alert-success" role="alert">
        <p>タイトル：{{ object.title }}</p>
        <p>投稿者：{{ object.author }}</p>
        <p>内容：{{ object.content }}</p>
        <p><img src='{{object.images.url}}' height=200></p>
        <a href="{% url 'good' object.pk %}" class="btn btn-primary" role="button" aria-disabled="true">いいねする</a>
        <a href="{% url 'read' object.pk %}" class="btn btn-secondary" role="button" aria-disabled="true">既読にする</a>
    </div>
    <a href="{% url 'list' %}">戻る</a>
</div>
{% endblock content %}
